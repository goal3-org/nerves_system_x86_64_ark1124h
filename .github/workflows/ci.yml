name: CI

on:
  push:
    branches:
      - main

env:
  OTP_VERSION: 28.1.1
  ELIXIR_VERSION: 1.18.4-otp-28
  NERVES_BOOTSTRAP_VERSION: 1.14.0

jobs:
  build-and-deploy-main:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gridpoint-com/actions-nerves-system@v1

      - name: Check if version tag already exists
        id: check_tag
        run: |
          git fetch --tags
          version=$(cat VERSION)
          tag="v$version"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Tag $tag already exists, skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Get Buildroot Dependencies
        if: steps.check_tag.outputs.skip != 'true'
        uses: ./.actions/get-br-dependencies
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}
          nerves-bootstrap-version: ${{ env.NERVES_BOOTSTRAP_VERSION }}
          save-dl-cache: false

      - name: Build nerves_system
        if: steps.check_tag.outputs.skip != 'true'
        uses: ./.actions/build-system
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}
          nerves-bootstrap-version: ${{ env.NERVES_BOOTSTRAP_VERSION }}

      - name: Tag and deploy
        if: steps.check_tag.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(cat VERSION)
          TAG="v$VERSION"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi
          gh release create "$TAG" deploy/system/artifacts/* --title "$TAG" --draft